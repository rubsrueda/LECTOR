<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Texto a Voz (Versión Móvil)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { background-color: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .instruccion { color: #d9534f; font-weight: bold; font-size: 13px; margin-bottom: 15px; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; resize: none; margin-bottom: 15px; line-height: 1.5; }
        .controls { display: flex; flex-direction: column; gap: 15px; }
        select { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; background-color: #f8f9fa; }
        .slider-container { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .slider-container label { font-size: 14px; font-weight: bold; color: #555; }
        input[type="range"] { width: 100%; }
        .botones-reproduccion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.96); }
        .btn-play { background-color: #007bff; } 
        .btn-pause { background-color: #ffc107; color: #333; } 
        .btn-resume { background-color: #28a745; } 
        .btn-stop { background-color: #dc3545; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lector de Texto 🗣️</h1>
        <p class="instruccion">⚠️ En iPhone, asegúrate de quitar el modo silencio (botón lateral).</p>
        
        <textarea id="texto" placeholder="Escribe o pega aquí tu texto..."></textarea>
        
        <div class="controls">
            <select id="voces"><option value="">Cargando voces...</option></select>
            
            <div class="slider-container">
                <label for="velocidad">Velocidad: <span id="valorVelocidad">1.0</span>x</label>
                <!-- En móviles es mejor empezar en 1.0 por defecto -->
                <input type="range" id="velocidad" min="0.5" max="2" value="1.0" step="0.1">
            </div>

            <div class="botones-reproduccion">
                <button id="btnLeer" class="btn-play">▶️ Escuchar</button>
                <button id="btnPausar" class="btn-pause">⏸️ Pausar</button>
                <button id="btnReanudar" class="btn-resume">⏯️ Reanudar</button>
                <button id="btnDetener" class="btn-stop">⏹️ Detener</button>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('texto');
        const selectorVoces = document.getElementById('voces');
        const inputVelocidad = document.getElementById('velocidad');
        const valorVelocidad = document.getElementById('valorVelocidad');
        
        const btnLeer = document.getElementById('btnLeer');
        const btnPausar = document.getElementById('btnPausar');
        const btnReanudar = document.getElementById('btnReanudar');
        const btnDetener = document.getElementById('btnDetener');

        const sintesis = window.speechSynthesis;
        let vocesDisponibles = [];
        
        // PARCHE MÓVIL: Variable global para evitar que Safari/Chrome borren el audio
        window.mensajeActual = null; 

        inputVelocidad.addEventListener('input', () => {
            valorVelocidad.textContent = inputVelocidad.value;
        });

        // PARCHE MÓVIL: Función mejorada para cargar voces
        function cargarVoces() {
            vocesDisponibles = sintesis.getVoices();
            
            if (vocesDisponibles.length > 0) {
                selectorVoces.innerHTML = ''; 
                vocesDisponibles.forEach((voz) => {
                    const opcion = document.createElement('option');
                    opcion.textContent = `${voz.name} (${voz.lang})`;
                    opcion.value = voz.name;
                    selectorVoces.appendChild(opcion);
                });
            } else {
                selectorVoces.innerHTML = '<option value="">Voz por defecto del sistema</option>';
            }
        }

        // Intentar cargar inmediatamente
        cargarVoces();
        // Intentar cargar cuando el navegador esté listo
        if (sintesis.onvoiceschanged !== undefined) {
            sintesis.onvoiceschanged = cargarVoces;
        }

        btnLeer.addEventListener('click', () => {
            sintesis.cancel(); // Limpiar audios atascados

            let inicio = textarea.selectionStart;
            let fin = textarea.selectionEnd;
            let textoALeer = "";

            if (inicio !== fin) {
                textoALeer = textarea.value.substring(inicio, fin);
            } else {
                if (inicio === textarea.value.length) {
                    textoALeer = textarea.value;
                } else {
                    textoALeer = textarea.value.substring(inicio);
                }
            }

            if (textoALeer.trim() !== '') {
                window.mensajeActual = new SpeechSynthesisUtterance(textoALeer);

                // PARCHE MÓVIL: Si no cargaron las voces, igual reproducimos con la voz por defecto
                if (vocesDisponibles.length > 0) {
                    const vozSeleccionada = vocesDisponibles.find(v => v.name === selectorVoces.value);
                    if (vozSeleccionada) {
                        window.mensajeActual.voice = vozSeleccionada;
                    }
                }

                window.mensajeActual.rate = parseFloat(inputVelocidad.value);
                
                // Asegurar que hable
                setTimeout(() => {
                    sintesis.speak(window.mensajeActual);
                }, 50);

            } else {
                alert("Por favor, escribe un texto primero.");
            }
        });

        btnPausar.addEventListener('click', () => { sintesis.pause(); });
        btnReanudar.addEventListener('click', () => { sintesis.resume(); });
        btnDetener.addEventListener('click', () => { sintesis.cancel(); });

    </script>
</body>
</html>
