<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Texto a Voz Seguro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .instruccion { color: #d9534f; font-weight: bold; font-size: 13px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; resize: none; margin-bottom: 15px; line-height: 1.5; }
        textarea:focus { outline: none; border-color: #007bff; }
        .controls { display: flex; flex-direction: column; gap: 15px; }
        select { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; background-color: #f8f9fa; }
        .slider-container { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .slider-container label { font-size: 14px; font-weight: bold; color: #555; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .botones-reproduccion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { color: white; border: none; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.96); }
        .btn-play { background-color: #007bff; }
        .btn-pause { background-color: #ffc107; color: #333; }
        .btn-resume { background-color: #28a745; }
        .btn-stop { background-color: #dc3545; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lector de Texto 🗣️</h1>
        <p class="instruccion">Escribe un texto, elige una voz y presiona Escuchar.</p>
        
        <textarea id="texto" placeholder="Escribe o pega aquí tu texto..."></textarea>
        
        <div class="controls">
            <select id="voces">
                <option value="">Cargando voces del sistema...</option>
            </select>
            
            <div class="slider-container">
                <label for="velocidad">Velocidad: <span id="valorVelocidad">1.0</span>x</label>
                <input type="range" id="velocidad" min="0.5" max="2" value="1.0" step="0.1">
            </div>

            <div class="botones-reproduccion">
                <button id="btnLeer" class="btn-play">▶️ Escuchar</button>
                <button id="btnPausar" class="btn-pause">⏸️ Pausar</button>
                <button id="btnReanudar" class="btn-resume">⏯️ Reanudar</button>
                <button id="btnDetener" class="btn-stop">⏹️ Detener</button>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('texto');
        const selectorVoces = document.getElementById('voces');
        const inputVelocidad = document.getElementById('velocidad');
        const valorVelocidad = document.getElementById('valorVelocidad');
        
        const btnLeer = document.getElementById('btnLeer');
        const btnPausar = document.getElementById('btnPausar');
        const btnReanudar = document.getElementById('btnReanudar');
        const btnDetener = document.getElementById('btnDetener');

        let vocesDisponibles = [];
        window.mensajeActual = null; // Variable global

        // 1. Despertar el motor de audio en móviles con el primer toque en la pantalla
        let audioDesbloqueado = false;
        document.body.addEventListener('touchstart', function() {
            if (!audioDesbloqueado) {
                const despertar = new SpeechSynthesisUtterance('');
                despertar.volume = 0; // Silencioso
                window.speechSynthesis.speak(despertar);
                audioDesbloqueado = true;
            }
        }, { once: true });

        // Actualizar número de velocidad
        inputVelocidad.addEventListener('input', () => {
            valorVelocidad.textContent = inputVelocidad.value;
        });

        // Cargar voces disponibles
        function cargarVoces() {
            vocesDisponibles = window.speechSynthesis.getVoices();
            
            if (vocesDisponibles.length > 0) {
                selectorVoces.innerHTML = ''; 
                vocesDisponibles.forEach((voz) => {
                    const opcion = document.createElement('option');
                    opcion.textContent = `${voz.name} (${voz.lang})`;
                    opcion.value = voz.name;
                    selectorVoces.appendChild(opcion);
                });
            } else {
                selectorVoces.innerHTML = '<option value="">Voz predeterminada</option>';
            }
        }

        cargarVoces();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = cargarVoces;
        }

        // BOTÓN LEER
        btnLeer.addEventListener('click', () => {
            // NOTA: Quité el "sintesis.cancel()" de aquí porque en Safari eso bloquea el audio.
            // Si quieres reiniciar la lectura, primero dale al botón rojo de "Detener".

            let inicio = textarea.selectionStart;
            let fin = textarea.selectionEnd;
            let textoALeer = "";

            if (inicio !== fin) {
                textoALeer = textarea.value.substring(inicio, fin);
            } else {
                if (inicio === textarea.value.length) {
                    textoALeer = textarea.value;
                } else {
                    textoALeer = textarea.value.substring(inicio);
                }
            }

            if (textoALeer.trim() !== '') {
                window.mensajeActual = new SpeechSynthesisUtterance(textoALeer);
                
                // FORZAR EL IDIOMA (Evita que el celular rechace el texto)
                window.mensajeActual.lang = 'es-ES'; 

                if (vocesDisponibles.length > 0) {
                    const vozSeleccionada = vocesDisponibles.find(v => v.name === selectorVoces.value);
                    if (vozSeleccionada) {
                        window.mensajeActual.voice = vozSeleccionada;
                        window.mensajeActual.lang = vozSeleccionada.lang; // Usa el idioma de la voz elegida
                    }
                }

                window.mensajeActual.rate = parseFloat(inputVelocidad.value);
                
                // REPRODUCIR INMEDIATAMENTE
                window.speechSynthesis.speak(window.mensajeActual);

            } else {
                alert("Por favor, escribe un texto.");
            }
        });

        // BOTÓN PAUSAR
        btnPausar.addEventListener('click', () => { 
            window.speechSynthesis.pause(); 
        });

        // BOTÓN REANUDAR
        btnReanudar.addEventListener('click', () => { 
            window.speechSynthesis.resume(); 
        });

        // BOTÓN DETENER
        btnDetener.addEventListener('click', () => { 
            window.speechSynthesis.cancel(); 
        });

    </script>
</body>
</html>
